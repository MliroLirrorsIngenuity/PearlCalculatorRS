version: 2
updates:
  # Maintain Rust dependencies (exclude tauri to avoid version mismatch with npm)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      rust-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "tauri"
          - "tauri-*"
          - "wry"
          - "tao"

  # Maintain Frontend dependencies (exclude @tauri-apps to avoid version mismatch with cargo)
  - package-ecosystem: "npm"
    directory: "/pearl_calculator_ui"
    schedule:
      interval: "monthly"
    groups:
      npm-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "@tauri-apps/*"

  # Maintain GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
