name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        shell: bash
        run: |
          VERSION=$(cargo tree -p wasm-bindgen --depth 0 | head -n 1 | cut -d' ' -f2 | cut -c 2-)
          cargo install wasm-bindgen-cli --version "$VERSION"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Frontend Dependencies
        working-directory: pearl_calculator_ui
        run: pnpm install

      - name: Build WASM
        run: |
          cargo build -p pearl_calculator_wasm --target wasm32-unknown-unknown --release
          wasm-bindgen target/wasm32-unknown-unknown/release/pearl_calculator_wasm.wasm --out-dir pearl_calculator_wasm/pkg --target bundler

      - name: Frontend Build (TS + Vite)
        working-directory: pearl_calculator_ui
        run: pnpm exec tsc && pnpm exec vite build

      - name: Run tests
        run: cargo test --verbose

      - name: Build Desktop Bundle
        if: runner.os != 'Windows' || runner.arch != 'ARM64'
        working-directory: pearl_calculator_ui
        run: pnpm tauri build --debug

      - name: Collect Desktop Artifacts (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p upload_dist
          find target/debug/bundle -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.dmg" -o -name "*.app.tar.gz" \) -exec cp {} upload_dist/ \;
          if [ -f target/debug/pearl_calculator_ui ]; then
            cp target/debug/pearl_calculator_ui "upload_dist/pearl_calculator_ui-${{ runner.os }}-${{ runner.arch }}"
          fi

      - name: Collect Desktop Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p upload_dist
          find target/debug/bundle -type f \( -name "*.msi" -o -name "*.exe" \) -exec cp {} upload_dist/ \;
          if [ -f target/debug/pearl_calculator_ui.exe ]; then
            cp target/debug/pearl_calculator_ui.exe "upload_dist/pearl_calculator_ui-${{ runner.os }}-${{ runner.arch }}.exe"
          fi

      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: pearl-calculator-rs-${{ matrix.os }}
          if-no-files-found: error
          path: |
            upload_dist/**
            pearl_calculator_ui/dist/**
            pearl_calculator_wasm/pkg/**
